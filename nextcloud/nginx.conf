# nginx.conf
events {
  worker_connections 64;
}

http {
  # Define rate limit zones in the http block
  limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=collabora:10m rate=40r/s;

  server_tokens off;

  server {
    listen 80;
    server_name docker.compose.local;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name docker.compose.local;

    client_max_body_size 1G;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      limit_req zone=general burst=80 nodelay;
      limit_req_status 429;

      proxy_buffering off;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_pass http://nextcloud:80;
    }

    location /.well-known/carddav {
        return 301 https://$host:1124/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 https://$host:1124/remote.php/dav;
    }

    location ^~ /.well-known {
        return 301 https://$host:1124/remote.php/dav;
    }
  }

  server {
    listen 444 ssl;
    listen [::]:444 ssl;
    server_name docker.compose.local;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

     # static files
     location ^~ /browser {
       limit_req zone=collabora burst=80 nodelay;
       limit_req_status 429;
       proxy_pass http://collabora:9980;
       proxy_set_header Host $host;
     }

     # WOPI discovery URL
     location ^~ /hosting/discovery {
       limit_req zone=collabora burst=20 nodelay;
       limit_req_status 429;
       proxy_pass http://collabora:9980;
       proxy_set_header Host $host;
     }

     # Capabilities
     location ^~ /hosting/capabilities {
       limit_req zone=collabora burst=20 nodelay;
       limit_req_status 429;
       proxy_pass http://collabora:9980;
       proxy_set_header Host $host;
     }

     # main websocket
     location ~ ^/cool/(.*)/ws$ {
       limit_req zone=collabora burst=20 nodelay;
       limit_req_status 429;
       proxy_pass http://collabora:9980;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "Upgrade";
       proxy_set_header Host $host;
       proxy_read_timeout 36000s;
     }
     
    # download, presentation and image upload
     location ~ ^/(c|l)ool {
       proxy_pass http://collabora:9980;
       proxy_set_header Host $host;
     }

     # Admin Console websocket
     location ^~ /cool/adminws {
       proxy_pass http://collabora:9980;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "Upgrade";
       proxy_set_header Host $host;
       proxy_read_timeout 36000s;

       allow 192.168.178.0/24;  # your trusted subnet
       allow 172.16.0.0/12;   # docker internal
       deny all;
     }
  }
}
